<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập Admin - AI Marketing CRM</title>
  <style>
    :root {
      --navy: #0f2947;
      --navy-light: #1c3d63;
      --blue: #1f6feb;
      --accent: #ff6b35;
      --bg: #f8fafc;
      --line: #e2e8f0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(1200px 500px at 50% -10%, #1c3d63, #0f2947);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    .logo h1 {
      font-size: 24px;
      font-weight: 800;
      color: var(--navy);
      margin-bottom: 8px;
    }

    .logo p {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 6px;
    }

    .form-control {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }

    .form-control:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(31, 111, 235, 0.1);
    }

    .btn {
      width: 100%;
      background: var(--blue);
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(31, 111, 235, 0.2);
      transition: all 0.2s;
      margin-top: 10px;
    }

    .btn:hover {
      background: #115cc9;
    }

    .error-msg {
      color: #ef4444;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 15px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="logo">
      <h1>AI Marketing</h1>
      <p style="color:#64748b; font-size:13px; margin-bottom:24px;">Hệ thống quản trị đơn hàng &amp; CRM</p>
    </div>

    <div id="error-box" class="error-msg">Sai tài khoản hoặc mật khẩu!</div>

    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="username">Tài khoản</label>
        <input type="text" id="username" class="form-control" placeholder="Nhập tên đăng nhập..." required>
      </div>
      <div class="form-group">
        <label for="password">Mật khẩu</label>
        <input type="password" id="password" class="form-control" placeholder="Nhập mật khẩu..." required>
      </div>
      <button type="submit" class="btn">ĐĂNG NHẬP HỆ THỐNG</button>
    </form>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorBox = document.getElementById('error-box');

      errorBox.style.display = 'none';

      fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          window.location.reload(); // Reload to serve admin.html
        } else {
          errorBox.textContent = data.error || 'Đăng nhập thất bại!';
          errorBox.style.display = 'block';
        }
      })
      .catch(err => {
        console.error('Login error:', err);
        errorBox.textContent = 'Lỗi kết nối máy chủ!';
        errorBox.style.display = 'block';
      });
    }
  </script>
</body>
</html>
